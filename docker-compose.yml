services:
  fenestra:
    build: .
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,fenestra=debug
      - FENESTRA_JWT_SECRET=change-me-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
